# yaml-language-server: $schema=https://json.schemastore.org/dependabot-2.0.json

version: 2

updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "php"
    groups:
      major-updates:
        update-types:
          - "major"
      safe-updates:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "npm"
    groups:
      major-updates:
        update-types:
          - "major"
      safe-updates:
        update-types:
          - "minor"
          - "patch"
